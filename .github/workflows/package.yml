name: Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build gcc pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libebur128-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly

      - name: Build and install into AppDir
        run: |
          meson setup build --prefix=/usr
          ninja -C build
          DESTDIR="$PWD/AppDir" ninja -C build install

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          DEPLOY_GTK_VERSION: "4"
          OUTPUT: audio-compare-${{ github.ref_name }}-x86_64.AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gstreamer/master/linuxdeploy-plugin-gstreamer.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh linuxdeploy-plugin-gstreamer.sh
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/org.mmxgn.audiocompare.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/org.mmxgn.audiocompare.svg \
            --plugin gtk \
            --plugin gstreamer \
            --output appimage

      - uses: softprops/action-gh-release@v2
        with:
          files: audio-compare-*.AppImage

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper meson ninja-build \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libebur128-dev

      - name: Build .deb
        run: |
          cp -r packaging/debian debian
          dpkg-buildpackage -b -us -uc
          cp ../audio-compare_*.deb .

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"

  rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            meson ninja-build gcc rpm-build pkgconfig \
            gtk4-devel libadwaita-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel libebur128-devel

      - name: Build .rpm
        run: |
          VERSION=$(grep -oP "version\s*:\s*'\K[^']+" meson.build | head -1)
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          tar czf ~/rpmbuild/SOURCES/audio-compare-${VERSION}.tar.gz \
            --transform "s,^\.,audio-compare-${VERSION}," \
            --exclude='.git' .
          cp packaging/audio-compare.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/audio-compare.spec
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.rpm"
